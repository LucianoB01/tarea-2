<section class="register-section">
    <h1 [ngStyle]="{ 'color': formularioEnviado ? 'green' : 'black' }">Registrarse</h1>
    <p>Por favor, complete el formulario para registrarse.</p>
    <form class="form" [formGroup]="registerForm" (ngSubmit)="submitRegisterForm()">
        @if(getRegisterFormError()){
            <ul class="error-list">
                <li class="error-item" *ngFor="let error of errores">{{ error }}</li>
            </ul> 
        } 
        @if(formularioEnviado){
            <span class="success-item">Formulario enviado con éxito!</span>
        }
        <div class="form-group">
            <label for="name">Nombre de usuario:</label>
            <input 
                type="text" 
                formControlName="name"
                id="name" 
                name="name" 
                required
                class="input-field"
                [ngClass]="{
                    'invalid-input': 
                    registerForm.get('name')?.invalid 
                    && registerForm.get('name')?.touched
                }"
            >
        </div>

        <div class="form-group">
            <label for="email">Correo electrónico:</label>
            <input 
                type="email" 
                formControlName="email"
                id="email" 
                name="email" 
                required
                class="input-field"
                [ngClass]="{
                    'invalid-input': 
                    registerForm.get('email')?.invalid 
                    && registerForm.get('email')?.touched
                }"
            >
        </div>

        <div class="form-group">
            <label for="message">Mensaje:</label>
            <textarea 
                formControlName="message"
                id="message" 
                name="message"
                class="input-field"
            ></textarea>
        </div>
        
        <div class="form-group">
            <button 
                type="submit" 
                class="submit-button"
                [ngClass]="{
                    'submit-button': registerForm.valid, 
                    'disabled-button': !registerForm.valid
                }"
                [disabled]="!registerForm.valid"
            >
                Registrarse
            </button>
        </div>
    </form>
</section>
